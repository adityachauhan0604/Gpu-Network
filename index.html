<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Network Dashboard - Golden Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 50%, #0A192F 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Login Container */
        .login-container {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 32px;
            padding: 60px 50px;
            max-width: 480px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 35px 70px rgba(0,0,0,0.5),
                0 0 30px rgba(212, 175, 55, 0.2);
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #D4AF37, #C5A021, transparent);
            transition: left 0.8s;
        }

        .login-container:hover::before {
            left: 100%;
        }

        /* Logo/Header */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #D4AF37, #C5A021);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.4);
            font-size: 2.2rem;
            color: #121212;
            transition: all 0.3s ease;
        }

        .login-container:hover .login-logo {
            transform: scale(1.05) rotate(5deg);
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            background: linear-gradient(45deg, #D4AF37, #C5A021, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
            font-weight: 300;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-group {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            font-size: 1rem;
            color: #e0e0e0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            background: rgba(255,255,255,0.08);
        }

        .form-input::placeholder {
            color: rgba(224,224,224,0.5);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(212, 175, 55, 0.6);
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .form-input:focus + .input-icon,
        .form-input:focus ~ .input-icon {
            color: #D4AF37;
        }

        /* Login Button */
        .login-btn {
            background: linear-gradient(135deg, #D4AF37, #C5A021);
            color: #121212;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.4);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        /* Demo Credentials */
        .demo-info {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .demo-info h4 {
            color: #D4AF37;
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-family: 'Playfair Display', serif;
        }

        .demo-credentials {
            font-size: 0.85rem;
            opacity: 0.8;
            line-height: 1.6;
            background: rgba(212, 175, 55, 0.1);
            padding: 12px;
            border-radius: 10px;
            border-left: 3px solid #D4AF37;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 40px 30px;
                border-radius: 24px;
                margin: 10px;
            }
            
            .login-logo {
                width: 70px;
                height: 70px;
                font-size: 1.8rem;
            }
        }

        /* Success Animation */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(46, 204, 113, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            z-index: 10000;
        }

        .success-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .success-content {
            text-align: center;
            color: white;
            animation: bounceIn 0.6s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: spin 1s ease-in-out;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(18, 18, 18, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#D4AF37, #C5A021);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2>Login Successful!</h2>
            <p>Redirecting to GPU Network Dashboard...</p>
        </div>
    </div>

    <!-- Login Form -->
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-microchip"></i>
            </div>
            <h1 class="login-title">GPU Network</h1>
            <p class="login-subtitle">Provider Portal Access</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <input type="text" class="form-input" id="username" placeholder="Username" required>
                <i class="fas fa-user input-icon"></i>
            </div>
            
            <div class="form-group">
                <input type="password" class="form-input" id="password" placeholder="Password" required>
                <i class="fas fa-lock input-icon"></i>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Enter Dashboard
            </button>
        </form>

        <!-- Demo Credentials -->
        <div class="demo-info">
            <h4><i class="fas fa-info-circle"></i> Demo Access</h4>
            <div class="demo-credentials">
                <strong>Username:</strong> demo<br>
                <strong>Password:</strong> gpu123
            </div>
        </div>
    </div>

    <script>
        // Demo login functionality
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Demo credentials
            if (username === 'demo' && password === 'gpu123') {
                showSuccess();
                // Simulate redirect after 2 seconds
                setTimeout(() => {
                    // Here you would redirect to the actual dashboard
                    alert('🎉 Login successful! Dashboard would load here.\n\nDemo complete!');
                    // window.location.href = 'dashboard.html'; // Uncomment for real redirect
                }, 2000);
            } else {
                // Shake animation for wrong credentials
                const container = document.querySelector('.login-container');
                container.style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => {
                    container.style.animation = '';
                }, 500);
                
                // Show error
                alert('❌ Invalid credentials!\n\nUse: demo / gpu123');
            }
        });

        function showSuccess() {
            const overlay = document.getElementById('successOverlay');
            overlay.classList.add('show');
        }

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        // Form input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // Socket.io connection (for future real-time features)
        const socket = io('http://localhost:3000');
        socket.on('connect', () => console.log('🔗 Backend Connected'));
    </script>
</body>
</html>
