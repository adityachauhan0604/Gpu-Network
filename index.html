<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Network - Golden Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 50%, #0A192F 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Auth Container */
        .auth-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .auth-box {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 32px;
            padding: 60px 50px;
            max-width: 480px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 35px 70px rgba(0,0,0,0.5),
                0 0 30px rgba(212, 175, 55, 0.2);
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #D4AF37, #C5A021, transparent);
            transition: left 0.8s;
        }

        .auth-box:hover::before {
            left: 100%;
        }

        /* Logo/Header */
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #D4AF37, #C5A021);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.4);
            font-size: 2.2rem;
            color: #121212;
            transition: all 0.3s ease;
        }

        .auth-box:hover .auth-logo {
            transform: scale(1.05) rotate(5deg);
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            background: linear-gradient(45deg, #D4AF37, #C5A021, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
            font-weight: 300;
        }

        /* Form */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            font-size: 1rem;
            color: #e0e0e0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            background: rgba(255,255,255,0.08);
        }

        .form-input::placeholder {
            color: rgba(224,224,224,0.5);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(212, 175, 55, 0.6);
            font-size: 1.1rem;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .form-input:focus ~ .input-icon {
            color: #D4AF37;
        }

        /* Buttons */
        .auth-btn {
            background: linear-gradient(135deg, #D4AF37, #C5A021);
            color: #121212;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .auth-btn:hover::before {
            left: 100%;
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.4);
        }

        .toggle-btn {
            background: transparent;
            color: #D4AF37;
            border: 2px solid rgba(212, 175, 55, 0.3);
            padding: 15px;
            font-size: 0.95rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #D4AF37;
            transform: translateY(-2px);
        }

        /* Demo Info */
        .demo-info {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            font-size: 0.85rem;
        }

        .demo-info h4 {
            color: #D4AF37;
            margin-bottom: 12px;
            font-family: 'Playfair Display', serif;
        }

        .demo-credentials {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #D4AF37;
            line-height: 1.6;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-box {
                padding: 40px 30px;
                border-radius: 24px;
                margin: 10px;
            }
            .auth-logo {
                width: 70px;
                height: 70px;
                font-size: 1.8rem;
            }
        }

        /* Success Animation */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.95), rgba(39, 174, 96, 0.95));
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s ease;
            z-index: 10000;
        }

        .success-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .success-content {
            text-align: center;
            color: white;
            animation: bounceIn 0.8s ease;
            max-width: 400px;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            animation: spin 1.5s ease-in-out;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #fff, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-rocket"></i>
            </div>
            <h2 class="success-title">Welcome Aboard!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 10px;">Redirecting to Dashboard...</p>
            <div style="font-size: 0.9rem; opacity: 0.9;">Your GPU nodes are now LIVE 🚀</div>
        </div>
    </div>

    <!-- Auth Box -->
    <div class="auth-container">
        <div class="auth-box" id="authBox">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1 class="auth-title" id="authTitle">GPU Network</h1>
                <p class="auth-subtitle" id="authSubtitle">Join the decentralized revolution</p>
            </div>

            <form class="auth-form" id="authForm">
                <!-- Register fields hidden initially -->
                <div class="form-group" id="emailGroup" style="display: none;">
                    <input type="email" class="form-input" id="email" placeholder="Email Address">
                    <i class="fas fa-envelope input-icon"></i>
                </div>

                <div class="form-group" id="confirmGroup" style="display: none;">
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm Password">
                    <i class="fas fa-lock input-icon"></i>
                </div>

                <div class="form-group">
                    <input type="text" class="form-input" id="username" placeholder="Username">
                    <i class="fas fa-user input-icon"></i>
                </div>
                
                <div class="form-group">
                    <input type="password" class="form-input" id="password" placeholder="Password">
                    <i class="fas fa-lock input-icon"></i>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i> <span id="submitText">Login</span>
                </button>

                <button type="button" class="toggle-btn" id="toggleBtn">
                    <i class="fas fa-user-plus"></i> Don't have account? Register
                </button>
            </form>

            <!-- Demo Credentials -->
            <div class="demo-info">
                <h4><i class="fas fa-star"></i> Quick Demo</h4>
                <div class="demo-credentials">
                    👤 <strong>demo</strong> / 🔑 <strong>gpu123</strong>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isRegisterMode = false;

        // Toggle Login/Register
        document.getElementById('toggleBtn').addEventListener('click', function() {
            isRegisterMode = !isRegisterMode;
            
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');
            const submitText = document.getElementById('submitText');
            const submitBtn = document.getElementById('submitBtn');
            const emailGroup = document.getElementById('emailGroup');
            const confirmGroup = document.getElementById('confirmGroup');
            const toggleBtn = document.getElementById('toggleBtn');
            
            if (isRegisterMode) {
                // Register mode
                title.textContent = 'Create Account';
                subtitle.textContent = 'Join GPU Network today';
                submitText.textContent = 'Create Account';
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> ' + submitText.textContent;
                emailGroup.style.display = 'block';
                confirmGroup.style.display = 'block';
                toggleBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Already have account? Login';
            } else {
                // Login mode
                title.textContent = 'GPU Network';
                subtitle.textContent = 'Provider Portal Access';
                submitText.textContent = 'Login';
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> ' + submitText.textContent;
                emailGroup.style.display = 'none';
                confirmGroup.style.display = 'none';
                toggleBtn.innerHTML = '<i class="fas fa-user-plus"></i> Don\'t have account? Register';
            }
        });

        // Form submission
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            let isValid = true;
            let message = '';

            if (isRegisterMode) {
                // Register validation
                const email = document.getElementById('email').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
                    isValid = false;
                    message = 'Please enter valid email!';
                } else if (password !== confirmPassword) {
                    isValid = false;
                    message = 'Passwords do not match!';
                } else if (username === 'demo' || email === 'demo@example.com') {
                    isValid = false;
                    message = 'Username/Email already exists!';
                }
            } else {
                // Login validation
                if (username !== 'demo' || password !== 'gpu123') {
                    isValid = false;
                    message = 'Invalid credentials! Use: demo / gpu123';
                }
            }

            if (!isValid) {
                // Shake animation
                const authBox = document.getElementById('authBox');
                authBox.style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => {
                    authBox.style.animation = '';
                }, 500);
                alert('❌ ' + message);
                return;
            }

            // SUCCESS! 🎉
            showSuccess(isRegisterMode ? 'Registration Successful!' : 'Login Successful!');
        });

        function showSuccess(type) {
            const overlay = document.getElementById('successOverlay');
            const successTitle = overlay.querySelector('.success-title');
            
            successTitle.textContent = type;
            overlay.classList.add('show');
            
            // Auto redirect after 3 seconds
            setTimeout(() => {
                // DASHBOARD LOADS HERE! 🚀
                localStorage.setItem('loggedIn', 'true');
                window.location.href = '#dashboard';
                
                // Simulate dashboard load
                setTimeout(() => {
                    alert('🎉 ' + type + '\n\n✅ Dashboard Loaded Successfully!\n\nYour GPU nodes are now earning!');
                    
                    // Reset for demo
                    localStorage.removeItem('loggedIn');
                    location.reload();
                }, 500);
            }, 3000);
        }

        // Shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        // Input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
